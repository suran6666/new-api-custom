name: Build custom New API image

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional tag suffix, e.g. login-page-v1"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "**/*.go"
      - "web/**"
      - ".github/workflows/build-custom-ghcr.yml"

permissions:
  contents: read
  packages: write

env:
  DOCKER_BUILD_SUMMARY: true

jobs:
  build:
    name: Build and push linux/amd64 image
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image and version
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/new-api"
          short_sha="${GITHUB_SHA::7}"
          date_part="$(date -u +'%Y%m%d')"
          suffix="${{ github.event.inputs.tag_suffix }}"
          if [ -n "$suffix" ]; then
            suffix="-${suffix//[^A-Za-z0-9_.-]/-}"
          fi
          version="custom-${date_part}-${short_sha}${suffix}"
          echo "$version" > VERSION
          echo "IMAGE=$image" >> "$GITHUB_ENV"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:custom-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Deployment summary
        shell: bash
        run: |
          echo "### Custom New API image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE}:${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE}:custom-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
